name: build-desktop-windows

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/v}"
          else
            version="$(python -c "import runpy; print(runpy.run_path('paperinsight/__init__.py')['__version__'])")"
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"
          echo "Desktop build version: $version"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[llm,build]"

      - name: Build desktop backend executable
        run: python scripts/build_windows_exe.py --target desktop-backend --version "${{ steps.version.outputs.value }}"

      - name: Verify backend executable
        shell: bash
        run: |
          if [ -f "dist/PaperInsightBackend.exe" ]; then
            echo "✓ Backend executable found: dist/PaperInsightBackend.exe"
            ls -la dist/PaperInsightBackend.exe
          else
            echo "✗ Backend executable not found!"
            echo "Contents of dist directory:"
            ls -la dist/ || echo "dist directory does not exist"
            exit 1
          fi

      - name: Copy backend to desktop directory
        shell: bash
        run: |
          mkdir -p desktop/backend
          cp dist/PaperInsightBackend.exe desktop/backend/
          echo "✓ Backend copied to desktop/backend/"
          ls -la desktop/backend/

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm install

      - name: Build Windows desktop installer
        working-directory: desktop
        run: npm run dist:win
        env:
          DEBUG: electron-builder

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: paperinsight-desktop-windows-${{ steps.version.outputs.value }}
          path: |
            desktop/release/*.exe
            desktop/release/*.blockmap
            desktop/release/latest*.yml

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            desktop/release/*.exe
            desktop/release/*.blockmap
            desktop/release/latest*.yml
