name: build-desktop-windows

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $version = $env:GITHUB_REF.Substring(11)
          } else {
            $version = python -c "import pathlib, re; text = pathlib.Path('paperinsight/__init__.py').read_text(encoding='utf-8'); print(re.search(r'__version__\s*=\s*\"([^\"]+)\"', text).group(1))"
          }
          "value=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Desktop build version: $version"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[llm,build]"

      - name: Build desktop backend executable
        run: python scripts/build_windows_exe.py --target desktop-backend --version "${{ steps.version.outputs.value }}"

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm install

      - name: Build Windows desktop installer
        working-directory: desktop
        run: npm run dist:win

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: paperinsight-desktop-windows-${{ steps.version.outputs.value }}
          path: |
            desktop/release/*.exe
            desktop/release/*.blockmap
            desktop/release/latest*.yml

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            desktop/release/*.exe
            desktop/release/*.blockmap
            desktop/release/latest*.yml
