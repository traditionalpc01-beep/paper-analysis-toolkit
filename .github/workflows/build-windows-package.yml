name: build-windows-package

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/v}"
          else
            version="$(python -c "import runpy; print(runpy.run_path('paperinsight/__init__.py')['__version__'])")"
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"
          echo "Building version $version"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[llm,build]"

      - name: Build executable
        run: python scripts/build_windows_exe.py --version "${{ steps.version.outputs.value }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: paperinsight-windows-x64-${{ steps.version.outputs.value }}
          path: |
            dist/PaperInsight-windows-x64-${{ steps.version.outputs.value }}.zip
            dist/PaperInsight-windows-x64-${{ steps.version.outputs.value }}.zip.sha256

      - name: Prepare GitHub Packages payload
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $packageDir = Join-Path $PWD "package/nuget"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $packageDir "config") | Out-Null
          Copy-Item "dist/PaperInsight.exe" (Join-Path $packageDir "PaperInsight.exe")
          Copy-Item "config/config.example.yaml" (Join-Path $packageDir "config/config.example.yaml")
          @"
          # PaperInsight Windows

          This package contains the standalone `PaperInsight.exe` build for Windows.

          Quick start:

          1. Extract the package contents.
          2. Run `PaperInsight.exe check`
          3. Run `PaperInsight.exe config`
          4. Run `PaperInsight.exe analyze <pdf-folder>`

          For browser-based direct downloads, use the GitHub Release asset attached to the same tag.
          "@ | Set-Content -Path (Join-Path $packageDir "README.md") -Encoding UTF8

      - name: Pack NuGet package
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $packageDir = (Resolve-Path "package/nuget").Path
          $properties = @(
            "authors=${{ github.repository_owner }}"
            "projectUrl=https://github.com/${{ github.repository }}"
            "repositoryUrl=https://github.com/${{ github.repository }}"
            "packageDir=$packageDir"
          ) -join ";"
          nuget pack "packaging/windows/PaperInsight.Windows.nuspec" `
            -Version "${{ steps.version.outputs.value }}" `
            -OutputDirectory "package/out" `
            -Properties $properties

      - name: Configure NuGet source
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $configFile = Join-Path $env:RUNNER_TEMP "NuGet.config"
          Set-Content -Path $configFile -Encoding UTF8 -Value @'
<?xml version="1.0" encoding="utf-8"?>
<configuration>
</configuration>
'@
          nuget sources Add `
            -Name "github" `
            -Source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" `
            -Username "${{ github.actor }}" `
            -Password "${{ secrets.GITHUB_TOKEN }}" `
            -StorePasswordInClearText `
            -ConfigFile $configFile `
            -NonInteractive

      - name: Publish GitHub Package
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $configFile = Join-Path $env:RUNNER_TEMP "NuGet.config"
          nuget push "package/out/*.nupkg" `
            -Source "github" `
            -ApiKey "${{ secrets.GITHUB_TOKEN }}" `
            -ConfigFile $configFile `
            -SkipDuplicate `
            -NonInteractive

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/PaperInsight-windows-x64-${{ steps.version.outputs.value }}.zip
            dist/PaperInsight-windows-x64-${{ steps.version.outputs.value }}.zip.sha256
            package/out/*.nupkg
