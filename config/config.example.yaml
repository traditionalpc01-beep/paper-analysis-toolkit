# PaperInsight 配置示例
# 请复制此文件为 config.yaml 并填入您的 API Key

# MinerU PDF 解析配置 (推荐)
# 官方文档: https://mineru.net/apiManage/docs
# GitHub: https://github.com/opendatalab/MinerU
mineru:
  enabled: true
  mode: "cli"  # 可选: "cli" (本地命令行) 或 "api" (云端API)
  # CLI 模式: 需要安装 MinerU (pip install mineru)
  # API 模式: 需要配置 token
  token: ""  # API 模式必填，从 https://mineru.net 获取
  api_url: "https://mineru.net/api/v4"  # API 根路径（默认 v4）
  timeout: 600  # 解析超时时间（秒）
  model_version: "vlm"  # 可选: pipeline / vlm / MinerU-HTML
  output_format: "markdown"  # 输出格式: "markdown" 或 "json"
  extract_tables: true  # 是否提取表格
  method: "auto"  # 解析方法: "auto", "txt", "ocr"

# PaddleX API 配置 (百度AI Studio) - 作为 MinerU 的备选方案
# 获取方式: https://aistudio.baidu.com/paddleocr/task
paddlex:
  enabled: false
  token: "your-paddlex-token"
  model: "PaddleOCR-VL-1.5"  # 可选: PaddleOCR-VL-1.5, PaddleOCR-VL, PP-StructureV3, PP-OCRv5
  use_doc_orientation: false
  use_doc_unwarping: false
  use_layout_detection: true
  use_chart_recognition: false
  timeout: 300
  poll_interval: 5

# LLM 配置
# OpenAI: https://platform.openai.com/api-keys
# DeepSeek: https://platform.deepseek.com/api_keys
llm:
  enabled: true
  provider: "longcat"  # 或 "openai" / "deepseek" / "wenxin"
  api_key: "your-llm-api-key"
  model: "LongCat-Flash-Chat"
  base_url: ""  # 可选
  timeout: 120

# Web 搜索配置
web_search:
  enabled: true
  timeout: 30

# 缓存配置
cache:
  enabled: true
  directory: ".cache"

# 输出配置
output:
  format: ["excel", "json"]
  sort_by_if: true
  generate_error_log: true
  rename_pdfs: false
  rename_template: "[{year}_{impact_factor}_{journal}]_{title}.pdf"
  bilingual_text: true  # 对论文标题列开始后的自然语言文本字段输出“中文 | English”

# PDF 处理配置
pdf:
  max_pages: 0
  text_ratio_threshold: 0.1
