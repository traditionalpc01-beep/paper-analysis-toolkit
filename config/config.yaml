# PaperInsight 配置文件

# 百度 OCR API 配置
baidu_ocr:
  enabled: false
  api_key: ""
  secret_key: ""
  language: "CHN_ENG"  # 语言类型: CHN_ENG, ENG, CHN
  timeout: 60

# LLM 配置
llm:
  enabled: false
  provider: "openai"  # openai, deepseek
  api_key: ""
  model: "gpt-4o"
  base_url: ""  # 可选,用于代理
  timeout: 120

# Web 搜索配置
web_search:
  enabled: true
  timeout: 30

# 缓存配置
cache:
  enabled: true
  directory: ".cache"

# 输出配置
output:
  format: ["excel"]  # excel, json, csv
  sort_by_if: true
  generate_error_log: true

# PDF 处理配置
pdf:
  max_pages: 0  # 0 表示不限制
  text_ratio_threshold: 0.1  # 文本比例阈值,低于此值视为扫描版
